<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg_grad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1E1B4B"/> <!-- Extra Dark Blue -->
            <stop offset="1" stop-color="#4338CA"/> <!-- Indigo -->
        </linearGradient>
        
        <!-- Engine Flame Local Gradient -->
        <linearGradient id="exhaust_grad_local" x1="280" y1="512" x2="0" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#60A5FA"/> <!-- Cyan Glow -->
            <stop offset="0.6" stop-color="#3B82F6"/> <!-- Blue -->
            <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
        </filter>
    </defs>
    
    <!-- Rounded Background -->
    <rect width="1024" height="1024" rx="220" fill="url(#bg_grad)"/>
    
    <!-- Missile and Flame Group - Perfectly Centered on Diagonal -->
    <!-- translate(-40, -40) moves it towards top-left to balance the weight of the flame vs head -->
    <g transform="translate(512 512) rotate(-45) scale(1.15) translate(-540 -512)">
        <!-- Exhaust / Flame -->
        <path d="M280 472C280 472 150 420 50 450C-50 480 -50 544 50 574C150 604 280 552 280 552V472Z" fill="url(#exhaust_grad_local)" opacity="0.8"/>
        <!-- Inner Core of Flame -->
        <path d="M280 492C280 492 180 480 100 512C180 544 280 532 280 532V492Z" fill="white" opacity="0.6"/>

        <!-- Fins (Back) -->
        <path d="M280 472L180 392L180 632L280 552V472Z" fill="white" opacity="0.9"/>
        <path d="M320 442L280 312L450 312L410 442H320Z" fill="white" opacity="0.7"/>
        <path d="M320 582L280 712L450 712L410 582H320Z" fill="white" opacity="0.7"/>

        <!-- Main Body -->
        <rect x="280" y="462" width="480" height="100" rx="12" fill="white"/>
        
        <!-- Nose Cone -->
        <path d="M760 462L940 512L760 562V462Z" fill="white"/>
        
        <!-- Decorative Technology Strip -->
        <rect x="650" y="462" width="30" height="100" fill="#60A5FA"/>
    </g>

    <!-- Speed Lines in the background -->
    <rect x="500" y="120" width="200" height="8" rx="4" fill="white" opacity="0.1"/>
    <rect x="750" y="280" width="120" height="8" rx="4" fill="white" opacity="0.1"/>
    <rect x="150" y="820" width="180" height="8" rx="4" fill="white" opacity="0.1"/>
</svg>
